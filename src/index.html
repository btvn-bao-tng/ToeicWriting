<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOEIC SW Writing Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["system-ui", "-apple-system", "BlinkMacSystemFont", "Inter", "Segoe UI", "sans-serif"],
          },
          colors: {
            action: { DEFAULT: "#0066cc", focus: "#0071e3", dark: "#2997ff" },
            ink: { DEFAULT: "#1d1d1f", 80: "#333333", 48: "#7a7a7a" },
            parchment: "#f5f5f7",
            pearl: "#fafafc",
            hairline: "#e0e0e0",
            divider: "#f0f0f0",
            tile: { 1: "#272729", 2: "#2a2a2c", 3: "#252527" },
          },
        },
      },
    };
  </script>
  <style>
    html { -webkit-text-size-adjust: 100%; }
    body { font-size: 17px; line-height: 1.47; letter-spacing: -0.374px; }
    ::selection { background: #0066cc; color: #fff; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 9999px; border: 2px solid #f5f5f7; }
    @keyframes tw-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .tw-skel {
      background: linear-gradient(90deg, #e6e6eb 0%, #f3f3f5 20%, #e6e6eb 40%);
      background-size: 200% 100%;
      animation: tw-shimmer 1.4s ease-in-out infinite;
    }
    @media (prefers-reduced-motion: reduce) { .tw-skel { animation: none; } }
  </style>
</head>
<body class="bg-parchment font-sans text-ink antialiased">
  <div id="root"></div>
  <script src="/static/dist/app.js?v=20260723-prod1"></script>
</body>
</html>
